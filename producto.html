<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Producto</title>
<link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<section class="detalle">

   <div class="detalle-img">
    <img id="img-producto">
</div>

    <div class="info">
        <h2 id="nombre"></h2>
        <p id="precio"></p>

        <div class="cantidad">
            <button onclick="restar()">-</button>
            <span id="cant">1</span>
            <button onclick="sumar()">+</button>
        </div>

        <button onclick="agregarCarrito()">Agregar al carrito</button>
        <button onclick="comprarAhora()">Comprar ahora ⚡</button>
        <button class="pagar">Comprar ahora</button>
    </div>

</section>
<!-- 🛒 PANEL CARRITO (FUERA DEL HEADER) -->
<div id="panel-carrito" class="panel-carrito">

    <h2>Tu carrito 🛒</h2>
     <button class="cerrar-carrito" onclick="cerrarCarrito()">✖</button>

    <div id="lista-carrito"></div>

    <h3 id="total">Total: $0</h3>

    <button onclick="vaciarCarrito()">Vaciar</button>
    <button class="pagar" onclick="comprar()">Comprar</button>

</div>

<script src="js/producto.js"></script>
</body>
</html>
