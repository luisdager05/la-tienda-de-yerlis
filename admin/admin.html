<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Panel Admin</title>

<link rel="stylesheet" href="../css/admin.css">

</head>

<body>

<!-- PROTEGER PANEL -->
<script>

if(localStorage.getItem("adminLogueado") !== "true"){

    window.location.href = "./login.html";

}

</script>

<!-- TOP BAR -->
<div class="top-bar">

    <a href="../index.html" class="btn-volver">
        ← Volver a la tienda
    </a>

    <button onclick="cerrarSesion()" class="btn-salir">
        Cerrar Sesión
    </button>

</div>

<h1>📦 Panel Administrador</h1>

<div class="panel">

    <input
        type="text"
        id="nombre"
        placeholder="Nombre producto"
    >

    <input
        type="number"
        id="precio"
        placeholder="Precio"
    >

    <textarea
        id="descripcion"
        class="input-admin"
        placeholder="Descripción del producto"
    ></textarea>

    <select id="categoria" class="input-admin">

        <option value="">
            Seleccionar categoría
        </option>

        <option value="mujer">
            👗 Mujer
        </option>

        <option value="hombre">
            👕 Hombre
        </option>

        <option value="niño">
            🧒 Niño
        </option>

        <option value="accesorios">
            👜 Accesorios
        </option>

    </select>

    <!-- <input
        type="text"
        id="imagen"
        class="input-admin"
        placeholder="./img/imagen1.png"
    > pendiente prueba 10 si sale bien borrar -->
    <input
    type="file"
    id="imagen"
    class="input-admin"
    accept="image/*"
>
    <input
    type="text"
    id="talla"
    class="input-admin"
    placeholder="Tallas: S,M,L"
>

<input
    type="text"
    id="colores"
    class="input-admin"
    placeholder="Colores: negro,blanco,azul"
>
    <input
    type="number"
    id="valor_unitario"
    class="input-admin"
    placeholder="Valor unitario"
>
    <input
    type="number"
    id="stock"
    class="input-admin"
    placeholder="Stock"
>

<input
    type="number"
    id="ganancia"
    class="input-admin"
    placeholder="Ganancia"
    readonly
>

    <button onclick="guardarProducto()">
        Guardar Producto
    </button>

</div>

<h2 class="titulo-productos">
    📋 Productos
</h2>

<div id="listaProductos"></div>

   <!-- =========================
 INVENTARIO
========================= -->

<section class="admin-box">

    <h2>📦 Inventario</h2>

    <table class="tabla-admin">

        <thead>

            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Estado</th>
                <th>Valor Unitario</th>
                <th>Ganancia</th>
            </tr>

        </thead>

        <tbody id="tablaInventario"></tbody>

    </table>

</section>

<!-- =========================
 REPORTE VENTAS
========================= -->

<section class="admin-box">

    <h2>💰 Reporte de Ventas</h2>

    <div id="reporteVentas"></div>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="../js/supabase.js"></script>

<script src="../js/admin.js"></script>

</body>
</html>
