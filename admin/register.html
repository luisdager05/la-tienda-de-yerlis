<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crear Cuenta</title>

<link rel="stylesheet" href="../css/login.css">

</head>

<body>

<div class="login-container">

    <!-- LOGO -->
    <img
    src="../img/1001669605.png"
    class="logo-login"
    alt="Logo">

    <h1>Crear Cuenta</h1>

    <p class="subtitulo">
        Regístrate para comprar en La Tienda de Yerlis
    </p>

    <!-- FORMULARIO -->
    <form onsubmit="event.preventDefault(); registrarUsuario();">

        <!-- NOMBRE -->
        <div class="grupo-input">

            <label>Nombre completo</label>

            <input
            type="text"
            id="nombre"
            placeholder="Ingresa tu nombre">

        </div>

        <!-- EMAIL -->
        <div class="grupo-input">

            <label>Correo electrónico</label>

            <input
            type="email"
            id="email"
            placeholder="ejemplo@gmail.com">

        </div>

        <!-- PASSWORD -->
        <div class="grupo-input">

            <label>Contraseña</label>

            <input
            type="password"
            id="password"
            placeholder="Mínimo 6 caracteres">

        </div>

        <!-- BOTON -->
        <button type="submit">
            ✨ Registrarse
        </button>

    </form>

    <!-- MENSAJE -->
    <p id="mensaje"></p>

    <!-- LOGIN -->
    <p class="texto-login">

        ¿Ya tienes cuenta?

        <a href="./login.html">
            Iniciar sesión
        </a>

    </p>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="../js/supabase.js"></script>

<script>

async function registrarUsuario(){

    const nombre =
    document.getElementById("nombre")
    .value.trim();

    const email =
    document.getElementById("email")
    .value.trim();

    const password =
    document.getElementById("password")
    .value.trim();

    const mensaje =
    document.getElementById("mensaje");

    // VALIDAR
    if(
        nombre === "" ||
        email === "" ||
        password === ""
    ){

        mensaje.innerText =
        "⚠ Completa todos los campos";

        return;
    }

    mensaje.innerText =
    "Creando cuenta...";

    // REGISTRO
    const { data, error } =
    await window.supabaseClient.auth.signUp({

        email,
        password,

        options:{
            data:{
                nombre:nombre
            }
        }

    });

    // ERROR
    if(error){

    // MENSAJE MAS AMIGABLE
    if(
        error.message.includes("Password should contain")
    ){

        mensaje.innerText =
        "⚠ La contraseña debe tener mínimo: una mayúscula, una minúscula, un número y un símbolo.";

    } else {

        mensaje.innerText =
        error.message;

    }

    return;
}
    // EXITO
    mensaje.innerText =
    "✅ Cuenta creada correctamente. Revisa tu correo.";

    // LIMPIAR
    document.getElementById("nombre").value = "";
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";

}

</script>

</body>
</html>
