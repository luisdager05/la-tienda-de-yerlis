<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Tienda de Yerlis</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">
        <img src="img/logo.png">
        <h1>La Tienda de Yerlis</h1>
    </div>

    <nav>
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#productos">Productos</a></li>
            <li><a href="login.html" target="_blank">Admin</a></li>
        </ul>
    </nav>

    <!-- BOTÓN CARRITO -->
    <div class="carrito" onclick="toggleCarrito()">
        🛒 <span id="contador-carrito">0</span>
    </div>
</header>

<!-- CARRUSEL -->
<section class="carrusel-netflix">

    <button class="btn left" id="prev">❮</button>

    <div class="contenedor" id="slider"></div>

    <button class="btn right" id="next">❯</button>

    <div class="dots" id="dots"></div>

</section>

<!-- PRODUCTOS -->
<section id="productos">
    <h2>Nuestros Productos</h2>

    <div class="grid-productos">

        <div class="producto">
            <a href="ropa_mujer.html">
                <img src="img/imagen1.png">
            </a>
            <h3>ROPA DE MUJER</h3>
            <p>VER 👀</p>
        </div>

        <div class="producto">
           <a href="ropa_hombre.html"> <img src="img/imagen2.png"></a>
            <h3>ROPA DE HOMBRE</h3>
            <p>VER 👀</p>
        </div>

        <div class="producto">
            <img src="img/imagen3.png">
            <h3>CALZADO FORMAL - DEPORTIVO</h3>
            <p>VER 👀</p>
        </div>

        <div class="producto">
            <img src="img/imagen4.png">
            <h3>ACCESORIOS</h3>
            <p>VER 👀</p>
        </div>

        

    </div>
</section>



<!-- 🛒 PANEL CARRITO (FUERA DEL HEADER) -->
<div id="panel-carrito" class="panel-carrito">

    <h2>Tu carrito 🛒</h2>
     <button class="cerrar-carrito" onclick="cerrarCarrito()">✖</button>

    <div id="lista-carrito"></div>

    <h3 id="total">Total: $0</h3>

    <button onclick="vaciarCarrito()">Vaciar</button>
    <button class="pagar" onclick="comprar()">Comprar</button>

</div>



<!-- JS -->
<script src="js/app.js"></script>
<script src="js/carrito.js"></script>

<!-- FOOTER -->
<footer>
    <p>© 2026 La Tienda de Yerlis</p>
</footer>

</body>
</html>
