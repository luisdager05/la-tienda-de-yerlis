<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>La Tienda de Yerlis</title>

<link rel="stylesheet" href="./css/estilos.css">
</head>

<body>

<!-- HEADER PRINCIPAL -->
<header class="header-principal">

    <!-- LOGO -->
    <div class="logo">
        <img src="./img/1001669605.png" alt="La Tienda de Yerlis">
    </div>

    <!-- MENU -->
    <nav class="menu">

        <a href="index.html">Inicio</a>
        <a href="#productos">Productos</a>
        <a href="#contacto">Contacto</a>
        <a href="./admin/admin.html">Admin</a>

        <!-- CARRITO -->
        <a href="#" class="btn-carrito-menu" onclick="toggleCarrito()">
            🛒 Carrito
        </a>

    </nav>

</header>

<!-- BUSCADOR -->
<div class="buscador-container">

    <input 
        type="text"
        id="buscador"
        placeholder="🔍 Buscar productos..."
    >

</div>

<!-- CARRUSEL -->
<div class="contenedor-slider" id="productos">

    <button id="prev">❮</button>

    <div class="slider-container">
        <div id="slider"></div>
    </div>

    <button id="next">❯</button>

</div>

<div id="dots" class="dots"></div>

<!-- SECCIONES -->
<section class="seccion-productos">

    <h2>🔥 Productos Destacados</h2>
    <div class="contenedor-productos" id="destacados"></div>

</section>

<section class="seccion-productos">

    <h2>👗 Moda Mujer</h2>
    <div class="contenedor-productos" id="mujer"></div>

</section>

<section class="seccion-productos">

    <h2>👕 Moda Hombre</h2>
    <div class="contenedor-productos" id="hombre"></div>

</section>

<section class="seccion-productos">

    <h2>👜 Accesorios</h2>
    <div class="contenedor-productos" id="accesorios"></div>

</section>

<section class="seccion-productos">

    <h2>⭐ Más Vendidos</h2>
    <div class="contenedor-productos" id="vendidos"></div>

</section>

<!-- CONTACTO -->
<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- CONTACTO -->
<footer id="contacto">

    <div class="footer-contenido">

        <h2>Contáctanos</h2>

        <div class="footer-info">

            <a href="https://wa.me/573148471107" target="_blank">
                <i class="fa-brands fa-whatsapp"></i>
                WhatsApp
            </a>

            <a href="https://instagram.com/latiendadeyerlis" target="_blank">
                <i class="fa-brands fa-instagram"></i>
                Instagram
            </a>

            <a href="mailto:yerlisstore@gmail.com">
                <i class="fa-solid fa-envelope"></i>
                Email
            </a>

        </div>

        <div class="footer-copy">
            <p>© 2026 La Tienda de Yerlis - Todos los derechos reservados</p>
        </div>

    </div>

</footer>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="./js/supabase.js"></script>
<script src="./js/carrito.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
