<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Tienda de Yerlis</title>

<link rel="stylesheet" href="./css/estilos.css">
</head>

<body>

<nav class="menu">
    <a href="index.html">Inicio</a>
    <a href="#productos">Productos</a>
    <a href="#contacto">Contacto</a>
    <a href="./admin/admin.html">Admin</a>
    <a href="#" onclick="toggleCarrito()">🛒 Carrito</a>
</nav>

    <!-- BUSCADOR -->

<div class="buscador-container">

    <input 
        type="text"
        id="buscador"
        placeholder="🔍 Buscar productos..."
    >

</div>

<h1>🛍️ La Tienda de Yerlis</h1>

<div class="contenedor-slider">

    <button id="prev">❮</button>

    <div class="slider-container">
        <div id="slider"></div>
    </div>

    <button id="next">❯</button>

</div>

<div id="dots" class="dots"></div>
    <!-- PRODUCTOS DESTACADOS -->
<section class="seccion-productos">

    <h2>🔥 Productos Destacados</h2>

    <div class="contenedor-productos" id="destacados"></div>

</section>

<!-- MODA MUJER -->
<section class="seccion-productos">

    <h2>👗 Moda Mujer</h2>

    <div class="contenedor-productos" id="mujer"></div>

</section>

<!-- MODA HOMBRE -->
<section class="seccion-productos">

    <h2>👕 Moda Hombre</h2>

    <div class="contenedor-productos" id="hombre"></div>

</section>

<!-- ACCESORIOS -->
<section class="seccion-productos">

    <h2>👜 Accesorios</h2>

    <div class="contenedor-productos" id="accesorios"></div>

</section>

<!-- MÁS VENDIDOS -->
<section class="seccion-productos">

    <h2>⭐ Más Vendidos</h2>

    <div class="contenedor-productos" id="vendidos"></div>

</section>

<!-- CONTACTO -->
<footer id="contacto">

    <h2>📞 Contáctanos</h2>

    <p>WhatsApp: 300 000 0000</p>

    <p>Instagram: @latiendadeyerlis</p>

    <p>Email: yerlisstore@gmail.com</p>

    <p>© 2026 La Tienda de Yerlis</p>

</footer>

<!-- CARRITO -->
<div id="carrito" class="carrito">
    <h2>🛒 Carrito</h2>
    <div id="itemsCarrito"></div>
    <button onclick="cerrarCarrito()">Cerrar</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="./js/supabase.js"></script>
<script src="./js/carrito.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
